<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    {% if page.description %}
      <meta name="description" content="{{ page.description }}">
    {% endif %}
    <title>{{ page.title }}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;700&display=swap">

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
      html { background: #000; }
      body {
        background: #000;
        color: #fafafa;
        font: 17px/1.7 'IBM Plex Sans KR', sans-serif;
        height: 100vh;
        height: 100dvh;
      }
      .zine {
        position: fixed;
        inset: 0;
        scroll-snap-type: y mandatory;
        overflow-y: scroll;
        overflow-x: hidden;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .zine::-webkit-scrollbar { display: none; }

      .back {
        position: fixed;
        top: 1.1rem;
        left: 1.2rem;
        color: #888;
        text-decoration: none;
        font-size: 0.85rem;
        z-index: 10;
        letter-spacing: 0.02em;
      }
      .back:hover { color: #fafafa; }

      .card {
        scroll-snap-align: start;
        scroll-snap-stop: always;
        height: calc(100vh - 56px);
        height: calc(100dvh - 56px);
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 2rem 1.6rem;
        max-width: 560px;
        margin: 0 auto;
        position: relative;
      }

      .card h2 {
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0 0 1.1rem;
        line-height: 1.35;
        letter-spacing: -0.01em;
      }
      .card .body {
        font-size: 1rem;
        color: #c8c8c8;
        line-height: 1.8;
        word-break: keep-all;
      }
      .card .body p { margin: 0; }
      .card .body p + p { margin-top: 0.8em; }
      .card .body strong { color: #fafafa; font-weight: 700; }
      .card .body em { color: #fafafa; font-style: italic; }
      .card .body a { color: #fafafa; text-decoration: underline; text-decoration-color: #555; }
      .card .body a:hover { text-decoration-color: #fafafa; }
      .card .body ul, .card .body ol { margin: 0.4em 0; padding-left: 1.2em; }
      .card .body li + li { margin-top: 0.3em; }
      .card .body code {
        background: #1a1a1a;
        padding: 1px 6px;
        border-radius: 3px;
        font-size: 0.92em;
      }
      .card .body img {
        display: block;
        max-width: 100%;
        max-height: 36vh;
        width: auto;
        margin: 0 auto 1.2rem;
        border-radius: 4px;
      }
      .card .body small {
        display: block;
        margin-top: 1.2rem;
        color: #555;
        font-size: 0.72rem;
        line-height: 1.5;
      }
      .card .body small a { color: #888; text-decoration-color: #333; }

      .card.cover h2 { font-size: 2rem; line-height: 1.25; }
      .card.cover p { color: #888; font-size: 0.95rem; }
      .card.cover .author {
        color: #888;
        font-size: 0.78rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        margin: -0.4rem 0 1.4rem;
      }
      .card.cover .author a {
        color: #888;
        text-decoration: none;
        border-bottom: 1px solid #333;
      }
      .card.cover .author a:hover { color: #fafafa; border-bottom-color: #888; }
      .card.cover .lastmod {
        position: absolute;
        left: 1.6rem;
        right: 1.6rem;
        bottom: 1.2rem;
        text-align: center;
        color: #555;
        font-size: 0.7rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }

      .card.end h2 { font-size: 2rem; }
      .card.end p { color: #777; font-size: 0.9rem; }

      .sidebar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-top: 1px solid #1a1a1a;
        background: #000;
        z-index: 10;
      }
      .sidebar .pages {
        display: flex;
        gap: 4px;
        align-items: center;
        font-size: 0.85rem;
        font-variant-numeric: tabular-nums;
        user-select: none;
        overflow-x: auto;
        max-width: 100%;
        padding: 0 1rem;
        scrollbar-width: none;
      }
      .sidebar .pages::-webkit-scrollbar { display: none; }
      .sidebar .pages button {
        background: transparent;
        border: 0;
        color: #555;
        font: inherit;
        cursor: pointer;
        padding: 6px 2px;
        min-width: 1.4em;
        text-align: center;
        transition: color 0.15s;
      }
      .sidebar .pages button:hover { color: #ccc; }
      .sidebar .pages button.on {
        color: #fafafa;
        font-weight: 700;
      }

      @media (max-width: 480px) {
        .card { padding: 2rem 1.3rem; height: calc(100vh - 48px); height: calc(100dvh - 48px); }
        .card h2 { font-size: 1.35rem; }
        .card.cover h2, .card.end h2 { font-size: 1.7rem; }
        .sidebar { height: 48px; }
        .sidebar .pages { gap: 2px; font-size: 0.8rem; }

      }
    </style>
  </head>

  <body>
    <a class="back" href="{{ get_url(path='/') }}">back</a>

    <div class="zine">
      {{ page.content | safe }}
    </div>

    <aside class="sidebar" aria-hidden="true">
      <nav class="pages"></nav>
    </aside>

    <script>
      (function () {
        var zineEl = document.querySelector('.zine');
        var cards = document.querySelectorAll('.card');
        var pagesEl = document.querySelector('.sidebar .pages');
        var current = 0;
        var locked = false;
        var LOCK_MS = 700;
        var isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

        var buttons = [];
        cards.forEach(function (_, i) {
          var b = document.createElement('button');
          b.type = 'button';
          b.textContent = String(i + 1);
          b.setAttribute('aria-label', '카드 ' + (i + 1));
          b.addEventListener('click', function () { goTo(i); });
          pagesEl.appendChild(b);
          buttons.push(b);
        });

        function setActive(i) {
          buttons.forEach(function (b, j) { b.classList.toggle('on', j === i); });
          var active = buttons[i];
          if (active && pagesEl && pagesEl.scrollWidth > pagesEl.clientWidth) {
            var target = active.offsetLeft - pagesEl.clientWidth / 2 + active.clientWidth / 2;
            pagesEl.scrollTo({ left: target, behavior: 'smooth' });
          }
        }

        var io = new IntersectionObserver(function (entries) {
          entries.forEach(function (e) {
            if (e.isIntersecting) {
              var i = Array.prototype.indexOf.call(cards, e.target);
              current = i;
              setActive(i);
            }
          });
        }, { root: zineEl, threshold: 0.6 });
        cards.forEach(function (c) { io.observe(c); });

        function goTo(i) {
          i = Math.max(0, Math.min(cards.length - 1, i));
          if (i === current || locked) return;
          locked = true;
          current = i;
          cards[i].scrollIntoView({ behavior: 'smooth', block: 'start' });
          setTimeout(function () { locked = false; }, LOCK_MS);
        }

        // Wheel hijacking only on non-touch devices.
        // On touch devices we trust native CSS scroll-snap entirely
        // (scroll-snap-stop:always handles single-card-per-swipe).
        if (!isTouch) {
          zineEl.addEventListener('wheel', function (e) {
            e.preventDefault();
            if (locked) return;
            if (Math.abs(e.deltaY) < 4) return;
            goTo(current + (e.deltaY > 0 ? 1 : -1));
          }, { passive: false });
        }

        document.addEventListener('keydown', function (e) {
          if (e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ' || e.key === 'j') {
            e.preventDefault(); goTo(current + 1);
          } else if (e.key === 'ArrowUp' || e.key === 'PageUp' || e.key === 'k') {
            e.preventDefault(); goTo(current - 1);
          } else if (e.key === 'Home') {
            e.preventDefault(); goTo(0);
          } else if (e.key === 'End') {
            e.preventDefault(); goTo(cards.length - 1);
          }
        });
      })();
    </script>
  </body>
</html>
