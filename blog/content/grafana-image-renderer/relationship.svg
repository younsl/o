<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 600" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="560" height="600" fill="#000000"/>

  <defs>
    <marker id="arrow-rel-white" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FFFFFF"/>
    </marker>
  </defs>

  <!-- Alert Rule -->
  <rect x="40" y="40" width="180" height="80" rx="6" ry="6" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <text x="130" y="75" fill="#FFFFFF" font-size="15" font-weight="600" text-anchor="middle">Alert Rule</text>
  <text x="130" y="98" fill="#CCCCCC" font-size="11" text-anchor="middle">condition + labels +</text>
  <text x="130" y="112" fill="#CCCCCC" font-size="11" text-anchor="middle">annotations</text>

  <!-- Contact Point (center hub) -->
  <rect x="40" y="220" width="180" height="120" rx="6" ry="6" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <text x="130" y="255" fill="#FFFFFF" font-size="15" font-weight="600" text-anchor="middle">Contact Point</text>
  <text x="130" y="280" fill="#CCCCCC" font-size="11" text-anchor="middle">destination + auth +</text>
  <text x="130" y="294" fill="#CCCCCC" font-size="11" text-anchor="middle">format reference</text>
  <text x="130" y="318" fill="#AAAAAA" font-size="10" font-style="italic" text-anchor="middle">(slack / email / webhook / …)</text>

  <!-- Notification Template -->
  <rect x="290" y="245" width="230" height="80" rx="6" ry="6" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <text x="405" y="278" fill="#FFFFFF" font-size="15" font-weight="600" text-anchor="middle">Notification Template</text>
  <text x="405" y="302" fill="#CCCCCC" font-size="11" text-anchor="middle">reusable Go templates</text>
  <text x="405" y="316" fill="#CCCCCC" font-size="11" text-anchor="middle">(slack.title, slack.body, …)</text>

  <!-- Slack -->
  <rect x="40" y="460" width="180" height="80" rx="6" ry="6" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <text x="130" y="495" fill="#FFFFFF" font-size="15" font-weight="600" text-anchor="middle">Slack</text>
  <text x="130" y="518" fill="#CCCCCC" font-size="11" text-anchor="middle">#channel</text>

  <!-- Edges -->

  <!-- Alert Rule -> Contact Point (vertical) -->
  <line x1="130" y1="120" x2="130" y2="218" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arrow-rel-white)"/>
  <text x="138" y="160" fill="#FFFFFF" font-size="12" font-weight="500">fires</text>
  <text x="138" y="178" fill="#AAAAAA" font-size="10">routed by</text>
  <text x="138" y="191" fill="#AAAAAA" font-size="10">Notification Policy</text>
  <text x="138" y="204" fill="#AAAAAA" font-size="10">(label matchers)</text>

  <!-- Contact Point -> Notification Template (horizontal right) -->
  <line x1="220" y1="285" x2="288" y2="285" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arrow-rel-white)"/>
  <text x="254" y="278" fill="#FFFFFF" font-size="11" text-anchor="middle">references</text>

  <!-- Contact Point -> Slack (vertical down) -->
  <line x1="130" y1="340" x2="130" y2="458" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arrow-rel-white)"/>
  <text x="138" y="380" fill="#FFFFFF" font-size="12" font-weight="500">delivers</text>
  <text x="138" y="398" fill="#AAAAAA" font-size="10">HTTPS + bot token</text>
  <text x="138" y="411" fill="#AAAAAA" font-size="10">(chat.postMessage,</text>
  <text x="138" y="424" fill="#AAAAAA" font-size="10">files.*UploadExternal)</text>
</svg>
