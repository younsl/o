<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="20 15 490 280" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FFFFFF"/>
    </marker>
  </defs>

  <!-- Section captions -->
  <text x="108" y="35" fill="#FFFFFF" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="0.08em">TRIAGE</text>
  <text x="396" y="35" fill="#FFFFFF" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="0.08em">DRILLDOWN</text>

  <!-- Three pillars (width reduced by 20%: 170 -> 136) -->
  <rect x="40" y="55" width="136" height="60" rx="8" ry="8" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="108" y="80" fill="#FFFFFF" font-size="13" font-weight="600" text-anchor="middle">Metrics</text>
  <text x="108" y="100" fill="#FFFFFF" font-size="11" text-anchor="middle">is it slow?</text>

  <rect x="40" y="135" width="136" height="60" rx="8" ry="8" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="108" y="160" fill="#FFFFFF" font-size="13" font-weight="600" text-anchor="middle">Logs</text>
  <text x="108" y="180" fill="#FFFFFF" font-size="11" text-anchor="middle">what happened?</text>

  <rect x="40" y="215" width="136" height="60" rx="8" ry="8" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="108" y="240" fill="#FFFFFF" font-size="13" font-weight="600" text-anchor="middle">Traces</text>
  <text x="108" y="260" fill="#FFFFFF" font-size="11" text-anchor="middle">which service?</text>

  <!-- Profiles (width reduced by 20%: 200 -> 160), vertically aligned with Logs (center y=165) -->
  <rect x="316" y="125" width="160" height="80" rx="8" ry="8" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="396" y="160" fill="#FFFFFF" font-size="13" font-weight="600" text-anchor="middle">Profiles</text>
  <text x="396" y="182" fill="#FFFFFF" font-size="11" text-anchor="middle">which line of code?</text>

  <!-- Convergence funnel: three pillars meet at junction (y=165), single arrow exits -->
  <line x1="176" y1="85" x2="246" y2="165" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="176" y1="165" x2="246" y2="165" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="176" y1="245" x2="246" y2="165" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="246" cy="165" r="3" fill="#FFFFFF"/>
  <line x1="246" y1="165" x2="314" y2="165" stroke="#FFFFFF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Caption on the funnel (split into two lines so it fits in the gap between junction and Profiles box) -->
  <text x="283" y="148" fill="#FFFFFF" font-size="10" text-anchor="middle" font-style="italic" opacity="0.85">narrowed to</text>
  <text x="283" y="160" fill="#FFFFFF" font-size="10" text-anchor="middle" font-style="italic" opacity="0.85">one service</text>
</svg>
