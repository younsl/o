# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: local
    hooks:
      - id: helm-docs
        name: helm-docs
        entry: make -C box/kubernetes/charts docs
        language: system
        files: 'box/kubernetes/.*\.(yaml|tpl|gotmpl)$'
        pass_filenames: false
