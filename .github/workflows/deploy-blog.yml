name: Deploy blog
run-name: 🚀 Deploy Zola blog to GitHub Pages

on:
  push:
    branches: ["main"]
    paths: ["box/blog/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Zola
        env:
          ZOLA_VERSION: "0.22.1"
        run: |
          wget -qO /tmp/zola.tar.gz \
            https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz
          tar xzf /tmp/zola.tar.gz -C /tmp
          sudo mv /tmp/zola /usr/local/bin/
          zola --version

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Zola
        working-directory: box/blog
        run: zola build --base-url "${{ steps.pages.outputs.base_url }}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: box/blog/public

  deploy:
    environment:
      name: gh-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
