name: Release Rust Containers
run-name: "📦 Release rust containers (version label change)"

on:
  push:
    branches: [main]
    paths:
      - 'box/kubernetes/redis-console/Dockerfile'
  workflow_dispatch:
    inputs:
      project:
        description: "Project to release"
        required: true
        type: choice
        options:
          - redis-console

jobs:
  # ---------------------------------------------------------------------------
  # Detect: extract version from Dockerfile label, check GHCR for duplicates,
  # emit dynamic matrices for downstream jobs.
  # ---------------------------------------------------------------------------
  detect:
    runs-on: ubuntu-24.04
    permissions:
      packages: read
    outputs:
      has_releases: ${{ steps.gen.outputs.has_releases }}
      test_matrix: ${{ steps.gen.outputs.test_matrix }}
      docker_matrix: ${{ steps.gen.outputs.docker_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate release matrices
        id: gen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SELECTED: ${{ inputs.project }}
        run: |
          set -euo pipefail

          extract_version() {
            grep -oP 'org\.opencontainers\.image\.version="\K[^"]+' "$1" || echo ""
          }

          check_ghcr() {
            local image="$1" version="$2"
            local token tags
            token=$(echo -n "${GH_TOKEN}" | base64)
            tags=$(curl -sf -H "Authorization: Bearer ${token}" \
              "https://ghcr.io/v2/${image}/tags/list" 2>/dev/null || echo '{"tags":[]}')
            if echo "${tags}" | jq -e --arg v "${version}" '.tags // [] | index($v)' > /dev/null 2>&1; then
              echo "exists"
            else
              echo "new"
            fi
          }

          # project_name:project_dir
          PROJECTS=(
            "redis-console:redis-console"
          )

          TEST_JSON="[]"
          DOCKER_JSON="[]"

          for entry in "${PROJECTS[@]}"; do
            IFS=':' read -r project project_dir <<< "${entry}"
            dockerfile="box/kubernetes/${project_dir}/Dockerfile"

            if [[ -n "${SELECTED}" && "${SELECTED}" != "${project}" ]]; then
              continue
            fi

            if [[ ! -f "${dockerfile}" ]]; then
              echo "::warning::${dockerfile} not found, skipping"
              continue
            fi

            version=$(extract_version "${dockerfile}")
            if [[ -z "${version}" ]]; then
              echo "::error::org.opencontainers.image.version not found in ${dockerfile}"
              continue
            fi

            status=$(check_ghcr "younsl/${project}" "${version}")
            if [[ "${status}" == "exists" ]]; then
              echo "✅ ${project}:${version} already exists on GHCR — skip"
              continue
            fi
            echo "🆕 ${project}:${version} not found on GHCR — will release"

            project_base_dir="box/kubernetes/${project_dir}"
            image_name="younsl/${project}"

            TEST_JSON=$(echo "${TEST_JSON}" | jq -c \
              --arg project "${project}" \
              --arg base "${project_base_dir}" \
              '. + [{project: $project, base_dir: $base}]')

            DOCKER_JSON=$(echo "${DOCKER_JSON}" | jq -c \
              --arg project "${project}" \
              --arg base "${project_base_dir}" \
              --arg image "${image_name}" \
              --arg version "${version}" \
              '. + [{project: $project, base_dir: $base, image: $image, version: $version}]')
          done

          HAS_RELEASES="false"
          if [[ "$(echo "${TEST_JSON}" | jq 'length')" -gt 0 ]]; then
            HAS_RELEASES="true"
          fi

          echo "has_releases=${HAS_RELEASES}" >> "$GITHUB_OUTPUT"
          echo "test_matrix={\"include\":${TEST_JSON}}" >> "$GITHUB_OUTPUT"
          echo "docker_matrix={\"include\":${DOCKER_JSON}}" >> "$GITHUB_OUTPUT"

          echo "test_matrix: ${TEST_JSON}"
          echo "docker_matrix: ${DOCKER_JSON}"

  # ---------------------------------------------------------------------------
  # Test: fmt, clippy, tests, coverage (70% minimum, shared across projects)
  # ---------------------------------------------------------------------------
  test:
    needs: detect
    if: needs.detect.outputs.has_releases == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.test_matrix) }}
    env:
      PROJECT_BASE_DIR: ${{ matrix.base_dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ matrix.project }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: ${{ env.PROJECT_BASE_DIR }}/target
          key: ${{ runner.os }}-cargo-build-test-${{ matrix.project }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        working-directory: ${{ env.PROJECT_BASE_DIR }}
        run: cargo fmt --check

      - name: Run clippy
        working-directory: ${{ env.PROJECT_BASE_DIR }}
        run: cargo clippy -- -D warnings

      - name: Run tests
        working-directory: ${{ env.PROJECT_BASE_DIR }}
        run: |
          cargo test --verbose
          cargo test --release --verbose

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2.69.4
        with:
          tool: cargo-llvm-cov

      - name: Check test coverage (minimum 70%)
        working-directory: ${{ env.PROJECT_BASE_DIR }}
        run: cargo llvm-cov --fail-under-lines 70

  # ---------------------------------------------------------------------------
  # Build & push Docker image (rust:alpine multi-stage, multiarch)
  # ---------------------------------------------------------------------------
  build-docker:
    needs: [detect, test]
    if: needs.detect.outputs.has_releases == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.docker_matrix) }}
    env:
      PROJECT_BASE_DIR: ${{ matrix.base_dir }}
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ matrix.image }}
      VERSION: ${{ matrix.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.VERSION }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.PROJECT_BASE_DIR }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
