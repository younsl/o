apiVersion: v1
kind: Service
metadata:
  name: {{ include "snowflake-exporter.fullname" . }}
  labels:
    {{- include "snowflake-exporter.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  {{- with .Values.service.trafficDistribution }}
  trafficDistribution: {{ . }}
  {{- end }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "snowflake-exporter.selectorLabels" . | nindent 4 }}
