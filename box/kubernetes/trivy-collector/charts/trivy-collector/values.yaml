# -- (string) Override the name of the chart
nameOverride: ""

# -- (string) Override the full name of the chart
fullnameOverride: ""

# -- (int) Default replica count (deprecated — use server.replicaCount for UI pods;
# scraper always runs as a single replica to avoid split-brain writes).
replicaCount: 1

# -- (int) Number of old ReplicaSets to retain for rollback
revisionHistoryLimit: 10

# -- Container image configuration
image:
  # -- (string) Image repository
  repository: ghcr.io/younsl/trivy-collector
  # -- (string) Image pull policy
  pullPolicy: IfNotPresent
  # -- (string) Image tag (defaults to chart appVersion)
  tag: ""

# -- (list) Image pull secrets for private registries
imagePullSecrets: []

# -- ServiceAccount configuration
serviceAccount:
  # -- (bool) Create a ServiceAccount
  create: true
  # -- (bool) Automount service account token
  automount: true
  # -- (object) Annotations to add to the ServiceAccount
  annotations: {}
  # -- (string) Name of the ServiceAccount (auto-generated if empty)
  name: ""

# -- (object) Annotations to add to the pod
podAnnotations: {}

# -- (object) Labels to add to the pod
podLabels: {}

# -- Pod security context configuration
podSecurityContext:
  # -- (bool) Run as non-root user
  runAsNonRoot: true
  # -- (int) User ID to run as
  runAsUser: 1000
  # -- (int) Group ID to run as
  runAsGroup: 1000
  # -- (int) Filesystem group ID
  fsGroup: 1000

# -- Container security context configuration
securityContext:
  # -- (bool) Disallow privilege escalation
  allowPrivilegeEscalation: false
  # -- Capabilities to drop
  capabilities:
    drop:
      - ALL
  # -- (bool) Mount root filesystem as read-only
  readOnlyRootFilesystem: true

# -- (string) Cluster name identifier recorded on the Hub's own reports.
clusterName: "local"

# -- Scraper pod settings. Runs --mode=scraper. Writes Trivy reports to the
# shared PVC. Always a single replica to avoid split-brain SQLite writers.
scraper:
  # -- (list) Namespaces the local watcher scans on the Hub's own cluster
  # (empty = all).
  namespaces: []
  # -- (bool) Enable the local-cluster watcher (Hub itself). Set to false if
  # Trivy Operator is not installed on the central cluster.
  watchLocal: true
  # -- (object) Resource requests and limits.
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  # -- (list) Container resize policy for in-place resource updates.
  resizePolicy: []
  # -- (object) Node selector.
  nodeSelector: {}
  # -- (list) Tolerations.
  tolerations: []
  # -- (object) Affinity rules.
  affinity: {}
  # -- (list) Topology spread constraints.
  topologySpreadConstraints: []
  # -- ServiceMonitor for scraper (requires Prometheus Operator).
  serviceMonitor:
    # -- (bool) Create a ServiceMonitor for the scraper pod.
    enabled: false
    # -- (string) Scrape interval.
    interval: 30s
    # -- (string) Scrape timeout (defaults to Prometheus global when empty).
    scrapeTimeout: ""
    # -- (object) Additional labels to attach to the ServiceMonitor.
    additionalLabels: {}
    # -- (object) Annotations to attach to the ServiceMonitor.
    annotations: {}

# -- Server pod settings. Runs --mode=server. Reads the shared SQLite DB.
server:
  # -- (int) Replica count for the UI / API pod.
  replicaCount: 1
  # -- (int) HTTP server port
  port: 3000
  # -- (string) Explicit external URL used to render "View report" deep
  # links in outbound notifications (e.g. `https://trivy.example.com`).
  # Leave empty to auto-derive from gateway.hostnames or ingress.hosts.
  externalUrl: ""
  # -- (object) Resource requests and limits.
  resources:
    limits:
      memory: 64Mi
    requests:
      cpu: 20m
      memory: 32Mi
  # -- (list) Container resize policy for in-place resource updates.
  resizePolicy: []
  # -- (object) Node selector.
  nodeSelector: {}
  # -- (list) Tolerations.
  tolerations: []
  # -- (object) Affinity rules.
  affinity: {}
  # -- (list) Topology spread constraints.
  topologySpreadConstraints: []
  # -- ServiceMonitor for server (requires Prometheus Operator).
  serviceMonitor:
    # -- (bool) Create a ServiceMonitor for the server pod.
    enabled: false
    # -- (string) Scrape interval.
    interval: 30s
    # -- (string) Scrape timeout (defaults to Prometheus global when empty).
    scrapeTimeout: ""
    # -- (object) Additional labels to attach to the ServiceMonitor.
    additionalLabels: {}
    # -- (object) Annotations to attach to the ServiceMonitor.
    annotations: {}

  # -- Persistent volume configuration
  persistence:
    # -- (bool) Enable persistent storage
    enabled: true
    # -- (string) Use existing PVC instead of creating one
    existingClaim: ""
    # -- (string) Storage class for dynamic provisioning
    storageClass: ""
    # -- (string) PVC access mode
    accessMode: ReadWriteOnce
    # -- (string) Storage size
    size: 1Gi
    # -- (object) Labels to add to the PVC
    labels: {}
    # -- (object) Annotations to add to the PVC
    annotations: {}

  # -- Ingress configuration
  ingress:
    # -- (bool) Enable Ingress
    enabled: false
    # -- (string) Ingress class name
    className: ""
    # -- (object) Annotations to add to the Ingress
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # cert-manager.io/cluster-issuer: letsencrypt-prod
    # -- (list) Ingress hosts configuration
    hosts:
      - host: trivy.example.com
        paths:
          - path: /
            pathType: Prefix
    # -- (list) TLS configuration for Ingress
    tls: []
    #  - secretName: trivy-tls
    #    hosts:
    #      - trivy.example.com

  # -- Gateway API HTTPRoute configuration (alternative to Ingress)
  gateway:
    # -- (bool) Enable HTTPRoute
    enabled: false
    # -- (string) HTTPRoute name (defaults to fullname)
    name: ""
    # -- (list) Parent Gateway references
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: main-gateway
        namespace: gateway-system
        sectionName: https
    # -- (list) Hostnames for the route
    hostnames:
      - trivy.example.com
    # -- (list) HTTP route rules
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        # -- (list) HTTPRoute filters (RequestHeaderModifier, ResponseHeaderModifier, RequestRedirect, URLRewrite, RequestMirror, ExtensionRef)
        filters: []
        # -- (list) HTTPBackendRefs. Each entry is rendered verbatim (group,
        # kind, name, port, weight). Empty `name` defaults to the server
        # pod's Service at render time.
        backendRefs:
          - group: ""
            kind: Service
            name: ""
            port: 3000
            weight: 1

  # -- Authentication configuration (server mode only)
  auth:
    # -- (string) Authentication mode: "none" (anonymous) or "keycloak" (OIDC)
    mode: "none"
    # -- RBAC configuration (ArgoCD-style CSV policy)
    rbac:
      # -- (string) RBAC policy CSV (ArgoCD format)
      # @default -- See values
      policy: |
        p, role:readonly, reports, get, allow
        p, role:readonly, clusters, get, allow
        p, role:readonly, stats, get, allow
        p, role:readonly, tokens, get, allow
        p, role:readonly, tokens, create, allow
        p, role:admin, *, *, allow
        g, admin, role:admin
      # -- (string) Default RBAC policy for authenticated users without explicit group bindings
      defaultPolicy: "role:readonly"
    # -- SSO configuration (only used when auth.mode is "keycloak")
    sso:
      # -- (string) OIDC issuer URL (e.g., https://keycloak.example.com/realms/trivy)
      issuer: ""
      # -- OIDC client ID configuration
      clientId:
        # -- (string) Plaintext client ID value (used if set, takes precedence over secret reference)
        value: ""
        # -- (string) Secret name containing client ID
        name: ""
        # -- (string) Secret key for client ID
        key: client-id
      # -- OIDC client secret configuration
      clientSecret:
        # -- (string) Plaintext client secret value (used if set, takes precedence over secret reference)
        value: ""
        # -- (string) Secret name containing client secret
        name: ""
        # -- (string) Secret key for client secret
        key: client-secret
      # -- (string) OIDC redirect URL (full callback URL, e.g., https://trivy.example.com/auth/callback)
      redirectUrl: ""
      # -- (list) OIDC scopes
      scopes:
        - openid
        - profile
        - email
        - groups

# -- Service configuration
service:
  # -- (string) Service type
  type: ClusterIP
  # -- (int) Service port
  port: 3000
  # -- (object) Annotations to add to the Service
  annotations: {}

# -- Health check configuration
health:
  # -- (int) Health check server port
  port: 8080

# -- Logging configuration
logging:
  # -- (string) Log format: "json" or "pretty"
  format: json
  # -- (string) Log level: trace, debug, info, warn, error
  level: info

# -- Liveness probe configuration
livenessProbe:
  httpGet:
    path: /healthz
    port: health
  # -- (int) Initial delay before starting probes
  initialDelaySeconds: 10
  # -- (int) Probe interval
  periodSeconds: 30
  # -- (int) Probe timeout
  timeoutSeconds: 5
  # -- (int) Number of failures before marking unhealthy
  failureThreshold: 3

# -- Readiness probe configuration
readinessProbe:
  httpGet:
    path: /readyz
    port: health
  # -- (int) Initial delay before starting probes
  initialDelaySeconds: 5
  # -- (int) Probe interval
  periodSeconds: 10
  # -- (int) Probe timeout
  timeoutSeconds: 5
  # -- (int) Number of failures before marking not ready
  failureThreshold: 3

# -- (string) DNS policy for the pod (ClusterFirst, ClusterFirstWithHostNet, Default, None)
# @default -- ""
dnsPolicy: ""

# -- (object) DNS configuration for the pod
# @default -- {}
dnsConfig: {}
  # nameservers:
  #   - 8.8.8.8
  # searches:
  #   - example.com
  # options:
  #   - name: ndots
  #     value: "2"

# -- (list) Extra Kubernetes objects to deploy alongside the chart
# @default -- []
extraObjects: []
  # - apiVersion: v1
  #   kind: ConfigMap
  #   metadata:
  #     name: extra-config
  #   data:
  #     key: value
