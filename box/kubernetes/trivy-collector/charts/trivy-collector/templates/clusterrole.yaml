{{- if .Values.serviceAccount.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "trivy-collector.fullname" . }}
  labels:
    {{- include "trivy-collector.labels" . | nindent 4 }}
rules:
  # Read-only access to Trivy Operator CRDs on any cluster the pod connects to.
  # For hub-pull mode this is used both locally and via mounted kubeconfig
  # credentials when watching remote Edge clusters.
  - apiGroups:
      - aquasecurity.github.io
    resources:
      - vulnerabilityreports
      - sbomreports
    verbs:
      - get
      - list
      - watch
{{- end }}
