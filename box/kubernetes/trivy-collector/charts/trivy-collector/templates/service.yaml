---
# Service targeting the server pod only (UI / API).
apiVersion: v1
kind: Service
metadata:
  name: {{ include "trivy-collector.serverName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trivy-collector.serverSelectorLabels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.health.port }}
      targetPort: health
      protocol: TCP
      name: metrics
  selector:
    {{- include "trivy-collector.serverSelectorLabels" . | nindent 4 }}
---
# Headless service for the scraper pod — only /metrics is exposed since there
# is no UI. Useful for Prometheus scraping and in-cluster debugging.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "trivy-collector.scraperName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trivy-collector.scraperSelectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.health.port }}
      targetPort: health
      protocol: TCP
      name: metrics
  selector:
    {{- include "trivy-collector.scraperSelectorLabels" . | nindent 4 }}
