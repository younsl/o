apiVersion: v1
kind: Service
metadata:
  name: {{ include "trivy-collector.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trivy-collector.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    {{- if eq .Values.mode "server" }}
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- end }}
    - port: {{ .Values.health.port }}
      targetPort: health
      protocol: TCP
      name: metrics
  selector:
    {{- include "trivy-collector.selectorLabels" . | nindent 4 }}
