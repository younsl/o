{{- if .Values.serviceAccount.create -}}
# Namespaced Role for hub-pull mode: the server needs to watch, create, update
# and delete cluster-registration Secrets in its own namespace only. The scope
# is intentionally limited to the release namespace to minimise blast radius if
# the server is compromised.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "trivy-collector.fullname" . }}-hub
  namespace: {{ .Values.server.hub.secretNamespace | default .Release.Namespace }}
  labels:
    {{- include "trivy-collector.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
{{- end }}
