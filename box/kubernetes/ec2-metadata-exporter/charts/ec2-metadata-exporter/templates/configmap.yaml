apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ec2-metadata-exporter.fullname" . }}
  labels:
    {{- include "ec2-metadata-exporter.labels" . | nindent 4 }}
data:
  AWS_REGION: {{ .Values.config.region | quote }}
  SCRAPE_INTERVAL: {{ .Values.config.scrapeInterval | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  LOG_FORMAT: {{ .Values.config.logFormat | quote }}
