apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aurora-database-insights-exporter.fullname" . }}
  labels:
    {{- include "aurora-database-insights-exporter.labels" . | nindent 4 }}
data:
  config.yaml: |
    server:
      listen_address: "0.0.0.0:9090"
      metrics_path: "/metrics"
    aws:
      region: {{ .Values.config.aws.region | quote }}
    discovery:
      interval_seconds: {{ .Values.config.discovery.intervalSeconds }}
      {{- with .Values.config.discovery.exportedTags }}
      exported_tags:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    collection:
      interval_seconds: {{ .Values.config.collection.intervalSeconds }}
      top_sql_limit: {{ .Values.config.collection.topSqlLimit }}
      top_host_limit: {{ .Values.config.collection.topHostLimit }}
    {{- if .Values.leaderElection.enabled }}
    leader_election:
      enabled: true
      lease_name: {{ .Values.leaderElection.leaseName }}
      lease_namespace: {{ .Release.Namespace }}
      lease_duration_seconds: {{ .Values.leaderElection.leaseDurationSeconds }}
      renew_deadline_seconds: {{ .Values.leaderElection.renewDeadlineSeconds }}
      retry_period_seconds: {{ .Values.leaderElection.retryPeriodSeconds }}
    {{- end }}
    logging:
      level: "info"
      format: "json"
