apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aurora-database-insights-exporter.fullname" . }}
  labels:
    {{- include "aurora-database-insights-exporter.labels" . | nindent 4 }}
data:
  config.yaml: |
    server:
      listen_address: "0.0.0.0:9090"
      metrics_path: "/metrics"
    aws:
      region: {{ .Values.config.aws.region | quote }}
    discovery:
      interval_seconds: {{ .Values.config.discovery.intervalSeconds }}
      {{- with .Values.config.discovery.engines }}
      engines:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      require_pi_enabled: {{ .Values.config.discovery.requirePIEnabled }}
      {{- with .Values.config.discovery.exportedTags }}
      exported_tags:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.config.discovery.include }}
      include:
        {{- with .identifiers }}
        identifier:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .tags }}
        tags:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- end }}
      {{- with .Values.config.discovery.exclude }}
      exclude:
        {{- with .identifiers }}
        identifier:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- end }}
    collection:
      interval_seconds: {{ .Values.config.collection.intervalSeconds }}
      top_sql_limit: {{ .Values.config.collection.topSqlLimit }}
      top_host_limit: {{ .Values.config.collection.topHostLimit }}
      max_concurrent_instances: {{ .Values.config.collection.maxConcurrentInstances }}
      instance_timeout_seconds: {{ .Values.config.collection.instanceTimeoutSeconds }}
    logging:
      level: "info"
      format: "json"
