{{- if .Values.leaderElection.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "aurora-database-insights-exporter.fullname" . }}-leader-election
  labels:
    {{- include "aurora-database-insights-exporter.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "aurora-database-insights-exporter.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "aurora-database-insights-exporter.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
