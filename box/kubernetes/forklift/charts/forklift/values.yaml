# Default values for forklift.

# -- (int) Number of replicas. With 2+ replicas, enable ha to elect a single active writer.
replicaCount: 2
# -- (int) Number of old ReplicaSets to retain for rollback.
revisionHistoryLimit: 10

image:
  # -- (string) Container image repository.
  repository: ghcr.io/younsl/forklift
  # -- (string) Image pull policy.
  pullPolicy: IfNotPresent
  # -- (string) Image tag. Defaults to the chart appVersion when empty.
  tag: ""

# -- (list) Image pull secrets for private registries.
imagePullSecrets: []
# -- (string) Override the chart name portion of resource names.
nameOverride: ""
# -- (string) Override the fully qualified resource name.
fullnameOverride: ""

# High availability via Kubernetes Lease leader election. Only the leader is
# Ready (the Service routes to it) and runs the blob sweeper, guaranteeing a
# single writer to the SQLite database on the shared RWX volume.
ha:
  # -- (bool) Enable leader election. Auto-derived from replicaCount > 1 when left null.
  enabled: null
  # -- (string) Lease object name. Defaults to the release fullname when empty.
  leaseName: ""
  # -- (string) Duration that non-leader candidates wait before attempting to acquire leadership.
  leaseDuration: 15s
  # -- (string) Deadline for the leader to renew the lease before giving up leadership.
  renewDeadline: 10s
  # -- (string) Interval between leadership acquisition attempts.
  retryPeriod: 2s

# PV-based replication: an alternative HA mode for clusters without
# ReadWriteMany storage (e.g. EBS-only). Renders a StatefulSet where every pod
# gets its own ReadWriteOnce PVC; the standby pulls the leader's SQLite
# snapshot and blobs every interval and promotes that copy when it wins the
# leader election. Replication is asynchronous: writes within one interval can
# be lost on failover. Traffic routes to the leader through the
# forklift.io/role=leader pod label (all pods stay Ready so rollouts proceed).
replication:
  # -- (bool) Enable PV-based replication (StatefulSet + per-pod RWO PVC). Use
  # with replicaCount 2. Mutually exclusive with the shared RWX volume mode.
  enabled: false
  # -- (string) Standby pull interval; also the bounded data-loss window on failover.
  interval: 30s
  # -- (string) Shared bearer token for the internal replication endpoints. If
  # empty a random token is generated into the chart Secret and preserved.
  token: ""

# Persistent storage for the SQLite metadata DB and the content-addressed blob
# store. For replicaCount > 1 the access mode MUST be ReadWriteMany (e.g. EFS,
# NFS, CephFS) so all replicas share the same volume. Exception: with
# replication enabled each pod gets its own ReadWriteOnce PVC (accessModes is
# ignored in that mode; storageClass, size and annotations still apply).
persistence:
  # -- (bool) Enable persistent storage. When false, data is lost on pod restart.
  enabled: true
  # -- (string) StorageClass for the PVC. Uses the cluster default when empty.
  storageClass: ""
  # -- (list) PVC access modes. MUST be ReadWriteMany for replicaCount > 1.
  accessModes:
    - ReadWriteMany
  # -- (string) PVC storage size.
  size: 20Gi
  # -- (object) Annotations to add to the PVC.
  annotations: {}
  # -- (string) Use an existing PVC instead of creating one.
  # existingClaim: ""

# Authentication and authorization.
auth:
  # -- (bool) Allow unauthenticated read (pull) access.
  anonymousRead: false
  # -- (string) Session cookie lifetime.
  sessionTTL: 12h
  # -- (string) Secret used to sign session cookies; MUST be shared across replicas.
  # If empty a value is generated into the chart Secret on first install and preserved.
  sessionSecret: ""
  bootstrap:
    # -- (string) Admin username seeded on first run (no users yet).
    adminUser: admin
    # -- (string) Admin password seeded on first run. If empty a random password is
    # generated into the chart Secret (key: bootstrap-admin-password) and preserved
    # across upgrades. Rotate after first login. Retrieve a generated password with:
    #   kubectl get secret <release>-forklift -o jsonpath='{.data.bootstrap-admin-password}' | base64 -d
    adminPassword: ""
  oidc:
    # -- (bool) Enable OIDC single sign-on.
    enabled: false
    # -- (string) OIDC issuer URL.
    issuerURL: ""
    # -- (string) OIDC client ID.
    clientID: ""
    # -- (string) OIDC client secret.
    clientSecret: ""
    # -- (string) OIDC redirect URL.
    redirectURL: ""
    # -- (string) Token claim used as the username.
    usernameClaim: preferred_username
    # -- (string) Token claim used for group membership.
    groupsClaim: groups
  # Declarative, ArgoCD-style RBAC reconciled from this chart on every startup.
  # The policy is authoritative for the roles, grants and group mappings it
  # defines (managed rows): removing an entry here removes it from the database
  # on the next restart. Roles, mappings and assignments created interactively
  # in the UI are left untouched and remain editable.
  rbac:
    # -- (bool) Enable declarative RBAC. When false, no policy is mounted and
    # authorization relies solely on roles managed through the UI/API.
    enabled: true
    # -- (string) Default role granted to every authenticated user, even with no
    # explicit role or group mapping (ArgoCD policy.default). Empty disables it
    # (deny-all until a role is granted). The default `readonly` role below grants
    # read (pull) access to all repositories for any signed-in user.
    policyDefault: readonly
    # -- (string) ArgoCD-style policy. Permission lines:
    #   p, <role>, repo, <action>, <repo-glob>, allow
    # where <action> is read|write|delete|approve|admin (or '*' = admin). Grant lines:
    #   g, <subject>, <role>
    # where <subject> is `group:<keycloak-group>`, `user:<username>`, or a bare
    # name (treated as a user). Lines starting with '#' are comments.
    policy: |
      # Read-only access to every repository (default role for all users).
      p, readonly, repo, read, *, allow

      # Full administrative access.
      p, admins, repo, admin, *, allow

      # Example: developers can pull and push to team repositories.
      # p, developer, repo, read, team-a-*, allow
      # p, developer, repo, write, team-a-*, allow

      # Example: map a Keycloak group and a specific user to roles.
      # g, group:/platform-admins, admins
      # g, user:alice, developer
    # -- (list) Local (password) accounts to provision declaratively. Each gets a
    # password generated into the chart Secret (key: local-user-<name>-password)
    # and preserved across upgrades, or set `password` explicitly. Grant roles to
    # them with `g, user:<name>, <role>` lines above. Existing accounts (incl. the
    # bootstrap admin) are never overwritten.
    accounts: []
    #  - name: ci-bot
    #    password: ""   # empty -> generated and stored in the Secret

# Per-repository audit log: records every artifact download/upload/delete and
# repository config change with user, status and client IP.
audit:
  # -- (bool) Enable the audit log.
  enabled: true
  # -- (string) Retention period; the leader prunes older entries. "0" keeps them forever.
  retention: 2160h # 90 days

# -- (bool) Seed default repositories on first run, like a fresh Nexus install: a
# proxy of each public registry (Maven Central, npm, crates.io, Go proxy) plus one
# local hosted repository per format. Idempotent. Set false to start with no repos.
seedDefaultRepos: true

log:
  # -- (string) Log level (debug, info, warn, error).
  level: info
  # -- (string) Log format (json, text).
  format: json

serviceAccount:
  # -- (bool) Create a ServiceAccount.
  create: true
  # -- (object) Annotations to add to the ServiceAccount (e.g. IRSA role ARN).
  annotations: {}
  # -- (string) ServiceAccount name. Generated from the fullname when empty.
  name: ""

rbac:
  # -- (bool) Create namespaced Role/RoleBinding for the Lease used by leader
  # election. Created when ha is on.
  create: true

service:
  # -- (string) Service type.
  type: ClusterIP
  # -- (int) Service port for HTTP traffic.
  port: 80
  # -- (int) Service port exposing Prometheus metrics (container port 8081).
  metricsPort: 8081
  # -- (object) Annotations to add to the Service.
  annotations: {}

ingress:
  # -- (bool) Enable Ingress.
  enabled: false
  # -- (string) IngressClass name.
  className: ""
  # -- (object) Annotations to add to the Ingress.
  annotations: {}
  # -- (list) Ingress host rules.
  hosts:
    - host: forklift.example.com
      paths:
        - path: /
          pathType: Prefix
  # -- (list) Ingress TLS configuration.
  tls: []

# Gateway API HTTPRoute (alternative to Ingress).
gateway:
  # -- (bool) Enable HTTPRoute.
  enabled: false
  # -- (string) HTTPRoute name. Defaults to the release fullname when empty.
  name: ""
  # -- (list) Parent Gateway references.
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main-gateway
      namespace: gateway-system
      sectionName: https
  # -- (list) Hostnames for the route.
  hostnames:
    - forklift.example.com
  # -- (list) HTTP route rules.
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      # -- (list) HTTPRoute filters (RequestHeaderModifier, ResponseHeaderModifier,
      # RequestRedirect, URLRewrite, RequestMirror, ExtensionRef).
      filters: []
      # -- (list) HTTPBackendRefs. Empty `name` defaults to the chart Service and
      # empty `port` to service.port at render time.
      backendRefs:
        - group: ""
          kind: Service
          name: ""
          port: ""
          weight: 1

# -- (object) Annotations to add to pods.
podAnnotations: {}
# -- (object) Labels to add to pods.
podLabels: {}

# -- (object) Pod-level security context.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

# -- (object) Container-level security context.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- (object) Container resource requests and limits.
resources:
  limits:
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

# -- (list) In-place pod vertical scaling policy (Kubernetes 1.27+ resize). Example:
#   - resourceName: memory
#     restartPolicy: NotRequired
resizePolicy: []

# -- (object) Liveness probe configuration.
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

# -- (object) Readiness probe configuration.
readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5

podDisruptionBudget:
  # -- (bool) Create a PodDisruptionBudget to keep replicas available during disruptions.
  enabled: true
  # -- (int) Minimum number of available replicas.
  minAvailable: 1

serviceMonitor:
  # -- (bool) Create a Prometheus Operator ServiceMonitor.
  enabled: false
  # -- (string) Scrape interval.
  interval: 30s
  # -- (string) Scrape timeout. Uses the Prometheus default when empty.
  scrapeTimeout: ""
  # -- (object) Additional labels for the ServiceMonitor (e.g. release selector).
  additionalLabels: {}

# -- (object) Node selector for pod scheduling.
nodeSelector: {}
# -- (list) Tolerations for pod scheduling.
tolerations: []
# -- (object) Affinity rules for pod scheduling.
affinity: {}
# -- (list) Topology spread constraints for pod scheduling.
topologySpreadConstraints: []

# -- (list) Raw environment variables appended to the container.
extraEnv: []

# -- (list) Arbitrary additional manifests to render (each value is templated).
extraObjects: []
