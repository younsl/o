{{- if .Values.replication.enabled }}
# PV-based replication mode: every pod owns a ReadWriteOnce PVC. The Lease
# leader serves traffic (selected by the forklift.io/role=leader pod label,
# patched by the application) while the standby pulls the leader's SQLite
# snapshot and blobs onto its own volume and promotes that copy on failover.
# All pods report Ready so StatefulSet rolling updates are never blocked by a
# permanently-unready standby.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "forklift.fullname" . }}
  labels:
    {{- include "forklift.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  serviceName: {{ include "forklift.headlessServiceName" . }}
  # Parallel lets both pods start together; leader election decides the active
  # instance, not pod ordinality.
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "forklift.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if .Values.auth.rbac.enabled }}
        checksum/rbac-policy: {{ .Values.auth.rbac.policy | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "forklift.selectorLabels" . | nindent 8 }}
        # Default role; the elected leader patches its own pod to role=leader.
        forklift.io/role: standby
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "forklift.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: forklift
          image: "{{ include "forklift.image" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 8081
          env:
            {{- include "forklift.env" . | nindent 12 }}
          {{- with .Values.resizePolicy }}
          resizePolicy:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- include "forklift.rbacVolumeMounts" . | nindent 12 }}
      {{- if or (not .Values.persistence.enabled) .Values.auth.rbac.enabled }}
      volumes:
        {{- if not .Values.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
        {{- include "forklift.rbacVolumes" . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
  {{- end }}
{{- end }}
