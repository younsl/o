apiVersion: v2
name: forklift
description: Lightweight Kubernetes-native artifact repository (Maven, npm, Cargo, Go) with proxy caching and supply-chain age policy
type: application
deprecated: false
version: 0.1.0
appVersion: "0.1.0"
home: https://github.com/younsl/o
sources:
  - https://github.com/younsl/o/tree/main/box/kubernetes/forklift
maintainers:
  - name: younsl
    email: cysl@kakao.com
    url: https://github.com/younsl
keywords:
  - artifact-repository
  - proxy
  - maven
  - npm
  - cargo
  - go-modules
  - nexus
annotations:
  artifacthub.io/changes: |
    - kind: added
      description: "Initial release: Maven/npm/Cargo/Go local and proxy repositories, OIDC and local auth, fine-grained PATs, per-repo caching and age policy, active/standby HA via leader election"
    - kind: added
      description: "PV-based HA replication: StatefulSet with per-pod RWO PVC, standby pulls leader SQLite snapshot and blobs, leader routing via forklift.io/role pod label"
    - kind: added
      description: "Gateway API HTTPRoute support as an alternative to Ingress"
