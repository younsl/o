<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#111111"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="470" fill="#ffffff"/>

  <!-- boundaries -->
  <rect x="170" y="30" width="470" height="410" rx="10" fill="#ffffff" stroke="#111111" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="186" y="52" font-size="14" font-weight="700" fill="#111111">Kubernetes cluster</text>
  <rect x="672" y="30" width="208" height="300" rx="10" fill="#ffffff" stroke="#111111" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="688" y="52" font-size="14" font-weight="700" fill="#111111">External services</text>

  <!-- client (actor, outside the cluster) -->
  <g font-size="12">
    <rect x="24" y="120" width="130" height="60" rx="6" fill="#111111" stroke="#111111"/>
    <text x="89" y="146" text-anchor="middle" font-weight="700" fill="#ffffff">Client</text>
    <text x="89" y="163" text-anchor="middle" font-size="9.5" fill="#cccccc">mvn npm cargo go pip</text>
  </g>

  <!-- service -->
  <g font-size="12">
    <rect x="196" y="124" width="84" height="52" rx="6" fill="#ffffff" stroke="#111111" stroke-width="1.5"/>
    <text x="238" y="154" text-anchor="middle" font-weight="700" fill="#111111">Service</text>
  </g>

  <!-- leader pod -->
  <g>
    <rect x="316" y="84" width="210" height="132" rx="6" fill="#111111" stroke="#111111" stroke-width="2.5"/>
    <text x="421" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Pod (leader)</text>
    <g font-size="11" fill="#dddddd">
      <text x="332" y="128">format handlers</text>
      <text x="332" y="143" font-size="9.5" fill="#999999">maven npm cargo go pypi</text>
      <text x="332" y="164">proxy cache + age policy</text>
      <text x="332" y="184">approval + version deny</text>
      <text x="332" y="204">OIDC + token auth</text>
    </g>
  </g>

  <!-- standby pod -->
  <g font-size="12">
    <rect x="316" y="244" width="210" height="60" rx="6" fill="#dddddd" stroke="#999999" stroke-dasharray="5 4"/>
    <text x="421" y="271" text-anchor="middle" font-weight="700" fill="#555555">Pod (standby)</text>
    <text x="421" y="287" text-anchor="middle" font-size="9.5" fill="#888888">promotes on failover</text>
  </g>

  <!-- persistent volume holding metadata + blobs -->
  <g font-size="12">
    <rect x="316" y="336" width="210" height="92" rx="8" fill="#f6f6f6" stroke="#111111" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="328" y="356" font-size="11" font-weight="700" fill="#333333">PersistentVolume</text>

    <rect x="332" y="366" width="86" height="48" rx="6" fill="#111111" stroke="#111111"/>
    <text x="375" y="388" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">SQLite</text>
    <text x="375" y="402" text-anchor="middle" font-size="9" fill="#cccccc">metadata</text>

    <rect x="428" y="366" width="82" height="48" rx="6" fill="#111111" stroke="#111111"/>
    <text x="469" y="388" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Blob store</text>
    <text x="469" y="402" text-anchor="middle" font-size="9" fill="#cccccc">content-addressed</text>
  </g>

  <!-- external resources -->
  <g font-size="12">
    <rect x="700" y="92" width="156" height="56" rx="6" fill="#111111" stroke="#111111"/>
    <text x="778" y="116" text-anchor="middle" font-weight="700" fill="#ffffff">Upstream registries</text>
    <text x="778" y="132" text-anchor="middle" font-size="9.5" fill="#cccccc">proxy / cache sources</text>

    <rect x="700" y="166" width="156" height="48" rx="6" fill="#111111" stroke="#111111"/>
    <text x="778" y="194" text-anchor="middle" font-weight="700" fill="#ffffff">Keycloak OIDC</text>
  </g>

  <!-- edges (orthogonal: horizontal or vertical only) -->
  <g stroke="#111111" stroke-width="1.5" fill="none">
    <path d="M154,150 H196" marker-end="url(#arrow)"/>
    <path d="M280,150 H316" marker-end="url(#arrow)"/>
    <path d="M526,120 H700" marker-end="url(#arrow)"/>
    <path d="M526,190 H700" marker-end="url(#arrow)"/>
    <path d="M421,216 V244" marker-end="url(#arrow)" stroke-dasharray="5 4"/>
    <path d="M421,304 V336" marker-end="url(#arrow)"/>
  </g>

  <!-- label backgrounds (white, so text reads cleanly) -->
  <g stroke="none" fill="#ffffff">
    <rect x="588" y="108" width="50" height="13" rx="2"/>
    <rect x="585" y="178" width="56" height="13" rx="2"/>
    <rect x="429" y="223" width="118" height="26" rx="2"/>
    <rect x="429" y="313" width="138" height="13" rx="2"/>
  </g>

  <!-- edge labels -->
  <g font-size="10" fill="#333333" text-anchor="middle">
    <text x="613" y="118">proxy fetch</text>
    <text x="613" y="188">OIDC login</text>
  </g>
  <g font-size="9.5" fill="#333333">
    <text x="433" y="233">Lease leader election</text>
    <text x="433" y="245">+ snapshot / blob pull</text>
    <text x="433" y="323">SQLite + blobs (RWX or RWO)</text>
  </g>
</svg>
