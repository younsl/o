{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ahen.fullname" . }}-events
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ahen.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "ahen.fullname" . }}-events
subjects:
  - kind: ServiceAccount
    name: {{ include "ahen.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
