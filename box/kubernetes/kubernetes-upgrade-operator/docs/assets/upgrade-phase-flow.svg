<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 812" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrNeutral" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#4b5768"/>
    </marker>
    <marker id="arrFwd" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2ea043"/>
    </marker>
    <marker id="arrRbk" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#bb8009"/>
    </marker>
    <marker id="arrFail" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#f85149"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="820" height="812" fill="#000000"/>

  <text x="410" y="40" text-anchor="middle" fill="#e6edf3" font-size="22" font-weight="600">EKSUpgrade Phase Flow</text>
  <text x="410" y="63" text-anchor="middle" fill="#7d8896" font-size="13">Rollback runs component phases in reverse order of a forward upgrade</text>

  <!-- Column headers -->
  <text x="215" y="100" text-anchor="middle" fill="#7ee787" font-size="16" font-weight="600">Forward</text>
  <text x="215" y="119" text-anchor="middle" fill="#6e7681" font-size="12" font-family="monospace">upgradeMode: Forward (default)</text>
  <text x="605" y="100" text-anchor="middle" fill="#f0c674" font-size="16" font-weight="600">Rollback</text>
  <text x="605" y="119" text-anchor="middle" fill="#6e7681" font-size="12" font-family="monospace">upgradeMode: Rollback</text>

  <!-- ==================== Arrows (drawn first, under boxes) ==================== -->
  <!-- Forward column arrows -->
  <line x1="215" y1="192" x2="215" y2="222" stroke="#4b5768" stroke-width="2" marker-end="url(#arrNeutral)"/>
  <line x1="215" y1="274" x2="215" y2="304" stroke="#4b5768" stroke-width="2" marker-end="url(#arrNeutral)"/>
  <line x1="215" y1="356" x2="215" y2="386" stroke="#2ea043" stroke-width="2" marker-end="url(#arrFwd)"/>
  <line x1="215" y1="438" x2="215" y2="468" stroke="#2ea043" stroke-width="2" marker-end="url(#arrFwd)"/>
  <line x1="215" y1="520" x2="215" y2="550" stroke="#2ea043" stroke-width="2" marker-end="url(#arrFwd)"/>
  <line x1="215" y1="602" x2="215" y2="632" stroke="#2ea043" stroke-width="2" marker-end="url(#arrFwd)"/>

  <!-- Rollback column arrows -->
  <line x1="605" y1="192" x2="605" y2="222" stroke="#4b5768" stroke-width="2" marker-end="url(#arrNeutral)"/>
  <line x1="605" y1="274" x2="605" y2="304" stroke="#4b5768" stroke-width="2" marker-end="url(#arrNeutral)"/>
  <line x1="605" y1="356" x2="605" y2="386" stroke="#bb8009" stroke-width="2" marker-end="url(#arrRbk)"/>
  <line x1="605" y1="438" x2="605" y2="468" stroke="#bb8009" stroke-width="2" marker-end="url(#arrRbk)"/>
  <line x1="605" y1="520" x2="605" y2="550" stroke="#bb8009" stroke-width="2" marker-end="url(#arrRbk)"/>
  <line x1="605" y1="602" x2="605" y2="632" stroke="#bb8009" stroke-width="2" marker-end="url(#arrRbk)"/>

  <!-- ==================== Boxes ==================== -->
  <!-- Row 0: Pending (shared) -->
  <g>
    <rect x="90" y="140" width="250" height="52" rx="8" fill="#1f2733" stroke="#3b4758" stroke-width="1.5"/>
    <text x="215" y="171" text-anchor="middle" fill="#c9d4e3" font-size="14" font-family="monospace">Pending</text>
    <rect x="480" y="140" width="250" height="52" rx="8" fill="#1f2733" stroke="#3b4758" stroke-width="1.5"/>
    <text x="605" y="171" text-anchor="middle" fill="#c9d4e3" font-size="14" font-family="monospace">Pending</text>
  </g>
  <!-- Row 1: Planning (shared) -->
  <g>
    <rect x="90" y="222" width="250" height="52" rx="8" fill="#1f2733" stroke="#3b4758" stroke-width="1.5"/>
    <text x="215" y="253" text-anchor="middle" fill="#c9d4e3" font-size="14" font-family="monospace">Planning</text>
    <rect x="480" y="222" width="250" height="52" rx="8" fill="#1f2733" stroke="#3b4758" stroke-width="1.5"/>
    <text x="605" y="253" text-anchor="middle" fill="#c9d4e3" font-size="14" font-family="monospace">Planning</text>
  </g>
  <!-- Row 2: PreflightChecking (shared) -->
  <g>
    <rect x="90" y="304" width="250" height="52" rx="8" fill="#1f2733" stroke="#3b4758" stroke-width="1.5"/>
    <text x="215" y="335" text-anchor="middle" fill="#c9d4e3" font-size="14" font-family="monospace">PreflightChecking</text>
    <rect x="480" y="304" width="250" height="52" rx="8" fill="#1f2733" stroke="#3b4758" stroke-width="1.5"/>
    <text x="605" y="335" text-anchor="middle" fill="#c9d4e3" font-size="14" font-family="monospace">PreflightChecking</text>
  </g>
  <!-- Row 3: first component (diverges) -->
  <g>
    <rect x="90" y="386" width="250" height="52" rx="8" fill="#12261a" stroke="#2ea043" stroke-width="1.5"/>
    <text x="215" y="417" text-anchor="middle" fill="#7ee787" font-size="14" font-family="monospace">UpgradingControlPlane</text>
    <rect x="480" y="386" width="250" height="52" rx="8" fill="#2b210a" stroke="#bb8009" stroke-width="1.5"/>
    <text x="605" y="417" text-anchor="middle" fill="#f0c674" font-size="13" font-family="monospace">RollingBackNodeGroups</text>
  </g>
  <!-- Row 4: second component -->
  <g>
    <rect x="90" y="468" width="250" height="52" rx="8" fill="#12261a" stroke="#2ea043" stroke-width="1.5"/>
    <text x="215" y="499" text-anchor="middle" fill="#7ee787" font-size="14" font-family="monospace">UpgradingAddons</text>
    <rect x="480" y="468" width="250" height="52" rx="8" fill="#2b210a" stroke="#bb8009" stroke-width="1.5"/>
    <text x="605" y="499" text-anchor="middle" fill="#f0c674" font-size="14" font-family="monospace">RollingBackAddons</text>
  </g>
  <!-- Row 5: third component -->
  <g>
    <rect x="90" y="550" width="250" height="52" rx="8" fill="#12261a" stroke="#2ea043" stroke-width="1.5"/>
    <text x="215" y="581" text-anchor="middle" fill="#7ee787" font-size="14" font-family="monospace">UpgradingNodeGroups</text>
    <rect x="480" y="550" width="250" height="52" rx="8" fill="#2b210a" stroke="#bb8009" stroke-width="1.5"/>
    <text x="605" y="581" text-anchor="middle" fill="#f0c674" font-size="13" font-family="monospace">RollingBackControlPlane</text>
  </g>
  <!-- Row 6: Completed (shared terminal) -->
  <g>
    <rect x="90" y="632" width="250" height="52" rx="8" fill="#132a1a" stroke="#2ea043" stroke-width="2"/>
    <text x="215" y="663" text-anchor="middle" fill="#7ee787" font-size="14" font-weight="600" font-family="monospace">Completed</text>
    <rect x="480" y="632" width="250" height="52" rx="8" fill="#132a1a" stroke="#2ea043" stroke-width="2"/>
    <text x="605" y="663" text-anchor="middle" fill="#7ee787" font-size="14" font-weight="600" font-family="monospace">Completed</text>
  </g>

  <!-- Failed terminal -->
  <rect x="305" y="738" width="210" height="48" rx="8" fill="#2d1418" stroke="#f85149" stroke-width="2"/>
  <text x="410" y="767" text-anchor="middle" fill="#ff7b72" font-size="14" font-weight="600" font-family="monospace">Failed</text>
  <path d="M215,684 C215,720 340,724 355,738" fill="none" stroke="#f85149" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrFail)"/>
  <path d="M605,684 C605,720 480,724 465,738" fill="none" stroke="#f85149" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrFail)"/>
  <text x="410" y="710" text-anchor="middle" fill="#7d8896" font-size="11">any phase transitions to Failed on error</text>
</svg>
