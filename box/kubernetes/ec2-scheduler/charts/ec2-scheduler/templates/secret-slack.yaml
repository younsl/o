{{- if .Values.slack.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ec2-scheduler.fullname" . }}-slack
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ec2-scheduler.labels" . | nindent 4 }}
type: Opaque
stringData:
  webhook-url: {{ .Values.slack.webhookUrl | quote }}
{{- end }}
