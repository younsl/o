apiVersion: v1
kind: Service
metadata:
  name: {{ include "ec2-scheduler.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ec2-scheduler.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "ec2-scheduler.selectorLabels" . | nindent 4 }}
