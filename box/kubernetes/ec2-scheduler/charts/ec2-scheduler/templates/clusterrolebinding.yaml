apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ec2-scheduler.fullname" . }}
  labels:
    {{- include "ec2-scheduler.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ec2-scheduler.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ec2-scheduler.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
