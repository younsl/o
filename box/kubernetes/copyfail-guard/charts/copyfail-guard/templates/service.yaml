{{- if .Values.service.create -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "copyfail-guard.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "copyfail-guard.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  clusterIP: None
  selector:
    {{- include "copyfail-guard.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.ports.metrics }}
      targetPort: metrics
      protocol: TCP
    - name: health
      port: {{ .Values.ports.health }}
      targetPort: health
      protocol: TCP
{{- end }}
