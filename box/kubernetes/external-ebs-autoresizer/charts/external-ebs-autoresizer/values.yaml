image:
  # -- (string) Container image registry
  registry: ghcr.io/younsl
  # -- (string) Container image repository
  repository: external-ebs-autoresizer
  # -- (string) Image tag; defaults to the chart appVersion when empty
  tag: ""
  # -- (string) Image pull policy
  pullPolicy: IfNotPresent

# -- (list) Image pull secrets for private registries
imagePullSecrets: []
# -- (string) Override the chart name
nameOverride: ""
# -- (string) Override the fully qualified release name
fullnameOverride: ""

# -- (int) Number of replicas. Setting this above 1 automatically enables leader election so only one replica reconciles.
replicaCount: 1

# -- (int) Number of old ReplicaSets to retain for rollback
revisionHistoryLimit: 3

# -- (object) Deployment update strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    # -- (string|int) Max Pods created above desired count during an update
    maxSurge: 25%
    # -- (string|int) Max Pods unavailable during an update
    maxUnavailable: 25%

# All fields below (except the grafanaAnnotation Secret fields and the process
# ports) are rendered verbatim into a single config.yaml, published as a
# ConfigMap and mounted at /etc/external-ebs-autoresizer/config.yaml.
config:
  # -- (string) AWS region to operate in (required)
  region: ""
  # -- (string) Comma-separated Key=Value tag filters selecting target instances; empty scans every instance in the account/region
  tagFilters: ""
  # -- (bool) Exclude EKS cluster nodes (managed node groups, self-managed, Karpenter) so only standalone EC2 instances are managed
  excludeEKSNodes: true
  # -- (string) Reconcile loop interval as a Go duration; supports h, m, s and combinations (e.g. 30s, 5m, 1h, 1h30m)
  reconcileInterval: "5m"
  # -- (int) Max instances reconciled in parallel per pass
  reconcileConcurrency: 10
  # -- (object) Default-policy volume-expansion settings applied to every instance not matched by a named policy. usageThresholdPercent and growMode are REQUIRED; the rest are optional.
  defaultPolicy:
    # -- (int) REQUIRED. Root filesystem usage percent that triggers a resize
    usageThresholdPercent: 80
    # -- (string) REQUIRED. Growth mode: "percent" grows by growPercent, "absolute" grows by growAmount
    growMode: percent
    # -- (bool) Pause the default policy: skip (never resize) every instance not matched by a named policy
    paused: false
    # -- (int) EBS volume growth percent per resize (used when growMode is percent)
    growPercent: 10
    # -- (string) Absolute growth per resize with a MiB or GiB unit, e.g. 10GiB or 5120MiB (used when growMode is absolute); MiB rounds up to whole GiB
    growAmount: "10GiB"
    # -- (int) Maximum volume size in GiB; resizes that would exceed it are skipped
    maxVolumeSizeGiB: 1000
  # -- (list) Per-instance-group resize policies. Each entry selects a group of instances via instanceSelector (tag equality and/or a Name regex) and overrides a subset of the default-policy resize settings for that group under its own resize block. When several policies match one instance the highest weight wins; ties fall back to list order. Instances matching no policy use defaultPolicy. Empty means all instances use defaultPolicy.
  policies: []
    # - name: db-nodes
    #   # Higher weight wins when multiple policies match one instance
    #   weight: 10
    #   instanceSelector:
    #     # tags and nameRegex are ANDed; at least one is required
    #     tags:
    #       Role: database
    #     nameRegex: "^prod-db-.*"
    #   resize:
    #     usageThresholdPercent: 70
    #     growMode: absolute
    #     growAmount: 50GiB
    #     maxVolumeSizeGiB: 2000
    # - name: batch-workers
    #   weight: 1
    #   instanceSelector:
    #     nameRegex: "^batch-.*"
    #   resize:
    #     # pause this group without deleting its config
    #     paused: true
    #     growPercent: 30
  # -- (string) SSM command poll timeout as a Go duration
  ssmCommandTimeout: "5m"
  # -- (string) Delay between SSM command and volume modification status polls as a Go duration
  ssmPollInterval: "1s"
  # -- (string) ModifyVolume optimizing-wait timeout as a Go duration
  volumeModifyTimeout: "10m"
  # -- (bool) Measure and decide only, never modify resources
  dryRun: false
  # -- (string) Log level: debug, info, warn, error
  logLevel: "info"
  # -- (string) Log format: json or text
  logFormat: "json"
  alertmanager:
    # -- (bool) Enable Alertmanager alerting on resize outcomes; requires url when true
    enabled: false
    # -- (string) Alertmanager v2 base URL, e.g. http://alertmanager-operated.monitoring:9093; required when enabled
    url: ""
    # -- (string) Timeout for each Alertmanager POST as a Go duration
    timeout: "5s"
    # -- (object) Static Key: Value labels merged into every alert for routing (e.g. cluster: prod)
    labels: {}
    # -- (string) Which resize outcomes to alert: all, success, or failure
    notifyOn: "success"
    # -- (string) Optional dashboard URL template appended to each alert's description as a Slack link; supports {instance_id}, {volume_id}, {device}, {instance_name} placeholders. Empty disables the link
    dashboardUrl: ""
  grafanaAnnotation:
    # -- (bool) Enable Grafana annotations on resize outcomes; requires url and a token when true
    enabled: false
    # -- (string) Grafana base URL; required when enabled
    url: "http://grafana.monitoring:3000"
    # -- (string) Timeout for each Grafana annotation POST as a Go duration
    timeout: "5s"
    # -- (list) Base tags merged into every annotation and subscribed to by dashboards
    tags:
      - event:ebs-resize
    # -- (string) Which resize outcomes to annotate: all, success, or failure
    annotateOn: "all"
    # -- (string) Grafana service account token; ignored when existingSecret is set. Stored in a generated Secret and injected via GRAFANA_API_TOKEN env, never written to the config file. For production prefer existingSecret.
    apiToken: ""
    # -- (string) Name of an existing Secret holding the Grafana token; takes precedence over apiToken
    existingSecret: ""
    # -- (string) Key within existingSecret (or the generated Secret) holding the token
    existingSecretKey: "token"

# -- (list) Additional environment variables for the container (raw EnvVar entries)
extraEnv: []
  # - name: HTTP_PROXY
  #   value: http://proxy.example.com:3128
  # - name: MY_SECRET
  #   valueFrom:
  #     secretKeyRef:
  #       name: my-secret
  #       key: token

# -- (list) Additional envFrom sources for the container (configMapRef/secretRef entries)
extraEnvFrom: []
  # - secretRef:
  #     name: extra-secret

ports:
  # -- (int) Port serving /healthz and /readyz
  health: 8080
  # -- (int) Port serving Prometheus /metrics
  metrics: 8081

rbac:
  # -- (bool) Create the Role and RoleBinding granting create/patch on Events for Kubernetes Event publishing
  create: true

serviceAccount:
  # -- (bool) Create a ServiceAccount
  create: true
  # -- (string) ServiceAccount name; defaults to the chart fullname when empty
  name: ""
  # -- (object) ServiceAccount annotations, e.g. the IRSA role ARN
  annotations: {}
    # eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/external-ebs-autoresizer
  # -- (bool) Automount the ServiceAccount token
  automountServiceAccountToken: true
  # -- (list) Image pull secrets attached to the ServiceAccount, injected into Pods that use it
  imagePullSecrets: []

service:
  # -- (bool) Create a Service exposing health and metrics ports
  enabled: true
  # -- (string) Service type
  type: ClusterIP
  # -- (string) Traffic distribution preference, e.g. PreferClose (requires Kubernetes 1.31+); empty omits the field
  trafficDistribution: ""

serviceMonitor:
  # -- (bool) Create a Prometheus Operator ServiceMonitor
  enabled: false
  # -- (string) Scrape interval
  interval: 30s
  # -- (string) Scrape timeout
  scrapeTimeout: 10s
  # -- (object) Extra labels for the ServiceMonitor
  labels: {}

# -- (object) Pod resource requests and limits
resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    memory: 128Mi

# -- (list) Container resize policy for in-place vertical scaling (requires Kubernetes 1.27+); empty omits the field
resizePolicy:
  - resourceName: cpu
    restartPolicy: NotRequired
  - resourceName: memory
    restartPolicy: NotRequired

# -- (object) Extra annotations for the pod
podAnnotations: {}
# -- (object) Extra labels for the pod
podLabels: {}

# -- (object) Pod-level security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# -- (object) Container-level security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- (object) Node selector for pod scheduling
nodeSelector: {}
# -- (list) Tolerations for pod scheduling
tolerations: []
# -- (object) Affinity rules for pod scheduling
affinity: {}

# -- (string) Pod DNS policy, e.g. ClusterFirst or None; empty omits the field
dnsPolicy: ""
# -- (object) Pod DNS config (used with dnsPolicy None); empty omits the field
dnsConfig: {}

# -- (list) Additional Kubernetes manifests rendered verbatim
extraObjects: []
