{{- /*
Render the full runtime configuration as a single config.yaml, mounted at
/etc/external-ebs-autoresizer/config.yaml. Everything under .Values.config maps
1:1 to the app's config schema, except: the process ports come from
.Values.ports, leaderElect is derived from replicaCount, leaseName from the
release fullname, and the grafanaAnnotation Secret fields are stripped (the
token is injected via the GRAFANA_API_TOKEN env from a Secret, never the file).
*/}}
{{- $cfg := deepCopy .Values.config }}
{{- $_ := set $cfg "healthPort" (.Values.ports.health | int) }}
{{- $_ := set $cfg "metricsPort" (.Values.ports.metrics | int) }}
{{- $_ := set $cfg "leaderElect" (eq (include "external-ebs-autoresizer.leaderElectEnabled" .) "true") }}
{{- $_ := set $cfg "leaseName" (include "external-ebs-autoresizer.fullname" .) }}
{{- $ga := deepCopy (.Values.config.grafanaAnnotation | default dict) }}
{{- $_ := unset $ga "apiToken" }}
{{- $_ := unset $ga "existingSecret" }}
{{- $_ := unset $ga "existingSecretKey" }}
{{- $_ := set $cfg "grafanaAnnotation" $ga }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "external-ebs-autoresizer.fullname" . }}
  labels:
    {{- include "external-ebs-autoresizer.labels" . | nindent 4 }}
data:
  config.yaml: |
    {{- toYaml $cfg | nindent 4 }}
