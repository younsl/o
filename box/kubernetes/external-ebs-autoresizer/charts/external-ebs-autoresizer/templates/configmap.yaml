apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "external-ebs-autoresizer.fullname" . }}
  labels:
    {{- include "external-ebs-autoresizer.labels" . | nindent 4 }}
data:
  AWS_REGION: {{ .Values.config.region | quote }}
  TAG_FILTERS: {{ .Values.config.tagFilters | quote }}
  EXCLUDE_EKS_NODES: {{ .Values.config.excludeEKSNodes | quote }}
  RECONCILE_INTERVAL: {{ .Values.config.reconcileInterval | quote }}
  RECONCILE_CONCURRENCY: {{ .Values.config.reconcileConcurrency | quote }}
  USAGE_THRESHOLD_PERCENT: {{ .Values.config.usageThresholdPercent | quote }}
  GROW_MODE: {{ .Values.config.growMode | quote }}
  GROW_PERCENT: {{ .Values.config.growPercent | quote }}
  GROW_AMOUNT: {{ .Values.config.growAmount | quote }}
  MAX_VOLUME_SIZE_GIB: {{ .Values.config.maxVolumeSizeGiB | quote }}
  SSM_COMMAND_TIMEOUT: {{ .Values.config.ssmCommandTimeout | quote }}
  SSM_POLL_INTERVAL: {{ .Values.config.ssmPollInterval | quote }}
  VOLUME_MODIFY_TIMEOUT: {{ .Values.config.volumeModifyTimeout | quote }}
  DRY_RUN: {{ .Values.config.dryRun | quote }}
  LEADER_ELECT: {{ if (include "external-ebs-autoresizer.leaderElectEnabled" .) }}"true"{{ else }}"false"{{ end }}
  LEASE_NAME: {{ include "external-ebs-autoresizer.fullname" . | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  LOG_FORMAT: {{ .Values.config.logFormat | quote }}
  ALERTMANAGER_ENABLED: {{ .Values.config.alertmanager.enabled | quote }}
  ALERTMANAGER_URL: {{ .Values.config.alertmanager.url | quote }}
  ALERTMANAGER_TIMEOUT: {{ .Values.config.alertmanager.timeout | quote }}
  ALERTMANAGER_LABELS: {{ .Values.config.alertmanager.labels | quote }}
  ALERTMANAGER_NOTIFY_ON: {{ .Values.config.alertmanager.notifyOn | quote }}
  ALERTMANAGER_DASHBOARD_URL: {{ .Values.config.alertmanager.dashboardUrl | quote }}
  GRAFANA_ANNOTATION_ENABLED: {{ .Values.config.grafanaAnnotation.enabled | quote }}
  GRAFANA_URL: {{ .Values.config.grafanaAnnotation.url | quote }}
  GRAFANA_TIMEOUT: {{ .Values.config.grafanaAnnotation.timeout | quote }}
  GRAFANA_ANNOTATION_TAGS: {{ .Values.config.grafanaAnnotation.tags | quote }}
  GRAFANA_ANNOTATE_ON: {{ .Values.config.grafanaAnnotation.annotateOn | quote }}
