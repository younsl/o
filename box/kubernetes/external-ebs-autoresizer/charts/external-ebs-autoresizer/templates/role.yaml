{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "external-ebs-autoresizer.fullname" . }}
  labels:
    {{- include "external-ebs-autoresizer.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "update"]
  {{- if (include "external-ebs-autoresizer.leaderElectEnabled" .) }}
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
  {{- end }}
{{- end }}
