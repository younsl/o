image:
  # -- (string) Container image registry
  registry: ghcr.io/younsl
  # -- (string) Container image repository
  repository: opensearch-conflict-viewer
  # -- (string) Image tag; defaults to the chart appVersion when empty
  tag: ""
  # -- (string) Image pull policy
  pullPolicy: IfNotPresent

# -- (list) Image pull secrets for private registries
imagePullSecrets: []
# -- (string) Override the chart name
nameOverride: ""
# -- (string) Override the fully qualified release name
fullnameOverride: ""

# -- (int) Number of replicas. Keep at 1; each replica refreshes the snapshot independently and exposes identical series.
replicaCount: 1

# -- (int) Number of old ReplicaSets to retain for rollback
revisionHistoryLimit: 3

# -- (object) Deployment update strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    # -- (string|int) Max Pods created above desired count during an update
    maxSurge: 25%
    # -- (string|int) Max Pods unavailable during an update
    maxUnavailable: 25%

config:
  # -- (string) OpenSearch endpoint including scheme, e.g. https://opensearch.example.com:443
  opensearchUrl: ""
  # -- (string) Comma-separated index targets for the field capabilities call, e.g. logs-*,logstash-*
  indexTargets: "logs-*"
  # -- (string) Dashboards saved-objects index holding the index patterns
  kibanaIndex: ".kibana"
  # -- (string) Snapshot refresh interval as a Go duration; minimum 1m
  refreshInterval: "1h"
  # -- (string) Display name shown in the UI header; empty hides it
  clusterName: ""
  # -- (string) Log level: debug, info, warn, error
  logLevel: "info"
  # -- (string) Log format: json or text
  logFormat: "json"

auth:
  # -- (string) Name of an existing Secret holding the OpenSearch basic auth credentials; empty disables basic auth
  existingSecret: ""
  # -- (string) Key in the existing Secret holding the username
  usernameKey: "opensearch-username"
  # -- (string) Key in the existing Secret holding the password
  passwordKey: "opensearch-password"

# -- (list) Additional environment variables for the container (raw EnvVar entries)
extraEnv: []
  # - name: HTTP_PROXY
  #   value: http://proxy.example.com:3128

# -- (list) Additional envFrom sources for the container (configMapRef/secretRef entries)
extraEnvFrom: []
  # - secretRef:
  #     name: extra-secret

ports:
  # -- (int) Port serving the UI, /api/conflicts, /metrics, /healthz, and /readyz
  http: 8080

serviceAccount:
  # -- (bool) Create a ServiceAccount
  create: true
  # -- (string) ServiceAccount name; defaults to the chart fullname when empty
  name: ""
  # -- (object) ServiceAccount annotations
  annotations: {}
  # -- (bool) Automount the ServiceAccount token
  automountServiceAccountToken: false
  # -- (list) Image pull secrets attached to the ServiceAccount, injected into Pods that use it
  imagePullSecrets: []

service:
  # -- (bool) Create a Service exposing the http port
  enabled: true
  # -- (string) Service type
  type: ClusterIP
  # -- (string) Traffic distribution preference, e.g. PreferClose (requires Kubernetes 1.31+); empty omits the field
  trafficDistribution: ""

serviceMonitor:
  # -- (bool) Create a Prometheus Operator ServiceMonitor
  enabled: false
  # -- (string) Scrape interval
  interval: 60s
  # -- (string) Scrape timeout
  scrapeTimeout: 10s
  # -- (object) Extra labels for the ServiceMonitor
  labels: {}
  # -- When true, honorLabels preserves the metric's labels when they collide with the target's labels.
  honorLabels: false
  # -- Prometheus [RelabelConfigs] to apply to samples before scraping
  relabelings: []
  # -- Prometheus [MetricRelabelConfigs] to apply to samples before ingestion
  metricRelabelings: []

# -- (object) Pod resource requests and limits
resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    memory: 256Mi

# -- (list) Container resize policy for in-place vertical scaling (requires Kubernetes 1.27+); empty omits the field. CPU resizes in place without a restart; memory resizes restart the container.
resizePolicy:
  - resourceName: cpu
    restartPolicy: NotRequired
  - resourceName: memory
    restartPolicy: RestartContainer

# -- (object) Extra annotations for the pod
podAnnotations: {}
# -- (object) Extra labels for the pod
podLabels: {}

# -- (object) Pod-level security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# -- (object) Container-level security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- (object) Node selector for pod scheduling
nodeSelector: {}
# -- (list) Tolerations for pod scheduling
tolerations: []
# -- (object) Affinity rules for pod scheduling
affinity: {}

# -- (string) Pod DNS policy, e.g. ClusterFirst or None; empty omits the field
dnsPolicy: ""
# -- (object) Pod DNS config (used with dnsPolicy None); empty omits the field
dnsConfig: {}

# -- (list) Additional Kubernetes manifests rendered verbatim
extraObjects: []
